name: gym_ledger
description: Local-first gym & nutrition tracker. Your data never leaves your phone.
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  intl: ^0.19.0
  image: ^4.2.0
  image_picker: ^1.1.2
  mobile_scanner: ^7.1.2
  video_player: ^2.9.2
  google_mlkit_text_recognition: ^0.13.0
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  local_auth: ^2.2.0
  file_picker: ^10.3.8
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: PlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
    - family: VT323
      fonts:
        - asset: assets/fonts/VT323-Regular.ttf
